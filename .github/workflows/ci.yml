name: CI

on:
  pull_request:
    branches:
      - "main"
  push:
    branches:
      - "**"
    tags:
      - "v**"

jobs:
  health:
    name: Health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Format
        run: bun oxfmt --check

      - name: Type Check
        run: bun run types

      - name: Test
        run: bun run test
